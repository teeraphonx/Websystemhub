<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SystemHub Profile Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #040915;
        --bg-radial: rgba(37, 99, 235, 0.22);
        --card: rgba(14, 21, 39, 0.96);
        --card-inner: rgba(18, 27, 49, 0.92);
        --border: rgba(67, 92, 148, 0.4);
        --border-strong: rgba(96, 165, 250, 0.45);
        --text: #f8fafc;
        --muted: #97a4bc;
        --accent: #60a5fa;
        --accent-strong: #2563eb;
        --danger-bg: #2a0e15;
        --danger-border: #5c1c26;
        --danger-text: #fc8b9b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 15%, var(--bg-radial), transparent 28%),
          radial-gradient(circle at 80% 75%, rgba(59, 130, 246, 0.16), transparent 24%),
          linear-gradient(180deg, #020613 0%, var(--bg) 100%);
        color: var(--text);
        font-family:
          "Segoe UI",
          Tahoma,
          Geneva,
          Verdana,
          sans-serif;
      }

      .stage {
        position: relative;
        width: 100%;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px 16px;
      }

      .card {
        position: relative;
        width: min(100%, 440px);
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 32px;
        background: var(--card);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.65);
        padding: 32px;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0 auto auto 0;
        width: 100%;
        height: 6px;
        background: linear-gradient(90deg, #3b82f6, #60a5fa);
      }

      .profile-header {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 32px;
      }

      .avatar-wrap {
        position: relative;
        flex: 0 0 auto;
      }

      .avatar-glow {
        position: absolute;
        inset: -10px;
        border-radius: 999px;
        background: rgba(37, 99, 235, 0.18);
        filter: blur(14px);
      }

      .avatar {
        position: relative;
        width: 84px;
        height: 84px;
        border-radius: 999px;
        border: 2px solid var(--accent-strong);
        background: linear-gradient(180deg, #10192f 0%, #0b1120 100%);
        display: grid;
        place-items: center;
        box-shadow: 0 0 18px rgba(37, 99, 235, 0.45);
      }

      .avatar-icon {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 2px solid var(--accent);
        position: relative;
      }

      .avatar-icon::before,
      .avatar-icon::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 999px;
      }

      .avatar-icon::before {
        top: 6px;
        width: 10px;
        height: 10px;
        border: 2px solid var(--accent);
      }

      .avatar-icon::after {
        bottom: 5px;
        width: 20px;
        height: 10px;
        border: 2px solid var(--accent);
        border-top-left-radius: 14px;
        border-top-right-radius: 14px;
        border-bottom: 0;
      }

      .name {
        margin: 0 0 6px;
        font-size: 36px;
        line-height: 1;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .email {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 600;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 9px 18px;
        border-radius: 999px;
        border: 1px solid rgba(59, 130, 246, 0.3);
        background: rgba(37, 99, 235, 0.14);
        color: var(--accent);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .stats {
        margin-bottom: 32px;
        padding: 24px;
        border-radius: 24px;
        border: 1px solid var(--border);
        background: var(--card-inner);
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      }

      .stats-row {
        display: flex;
        align-items: center;
        gap: 20px;
      }

      .stats-icon {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        border: 1px solid rgba(59, 130, 246, 0.35);
        background: rgba(30, 58, 138, 0.42);
        display: grid;
        place-items: center;
        color: var(--accent);
        font-size: 28px;
        font-weight: 900;
      }

      .stats-label {
        margin: 0 0 6px;
        color: #8d98ac;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.12em;
      }

      .stats-value {
        margin: 0;
        display: flex;
        align-items: baseline;
        gap: 8px;
        font-size: 42px;
        font-weight: 900;
        line-height: 1;
      }

      .stats-unit {
        color: var(--muted);
        font-size: 16px;
        font-weight: 600;
      }

      .actions {
        display: grid;
        gap: 14px;
        margin-bottom: 32px;
      }

      .action {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 20px;
        border-radius: 22px;
        background: rgba(16, 24, 43, 0.58);
        color: var(--text);
        border: 1px solid transparent;
      }

      .action-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .action-icon {
        color: var(--accent);
        font-size: 20px;
      }

      .action-label {
        font-size: 15px;
        font-weight: 800;
      }

      .action-arrow {
        color: #667085;
        font-size: 22px;
      }

      .logout {
        width: 100%;
        border: 1px solid var(--danger-border);
        border-radius: 22px;
        background: var(--danger-bg);
        color: var(--danger-text);
        padding: 18px 20px;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      @media (max-width: 540px) {
        .card {
          padding: 24px;
        }

        .profile-header {
          gap: 16px;
        }

        .name {
          font-size: 28px;
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="card">
        <div class="profile-header">
          <div class="avatar-wrap">
            <div class="avatar-glow"></div>
            <div class="avatar">
              <div class="avatar-icon"></div>
            </div>
          </div>

          <div>
            <h1 class="name">teeraphon</h1>
            <p class="email">teeraphon.sud@gmail.com</p>
            <div class="badge">Member</div>
          </div>
        </div>

        <section class="stats">
          <div class="stats-row">
            <div class="stats-icon">□</div>
            <div>
              <p class="stats-label">จองไปแล้ว</p>
              <p class="stats-value">
                3
                <span class="stats-unit">ชิ้น</span>
              </p>
            </div>
          </div>
        </section>

        <section class="actions">
          <div class="action">
            <div class="action-left">
              <span class="action-icon">◌</span>
              <span class="action-label">เปลี่ยนรหัสผ่าน</span>
            </div>
            <span class="action-arrow">›</span>
          </div>

          <div class="action">
            <div class="action-left">
              <span class="action-icon">◔</span>
              <span class="action-label">ประวัติการทำรายการ</span>
            </div>
            <span class="action-arrow">›</span>
          </div>
        </section>

        <button class="logout">ออกจากระบบ</button>
      </section>
    </main>
  </body>
</html>
